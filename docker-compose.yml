services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: versos
      POSTGRES_PASSWORD: versos
      POSTGRES_DB: versos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema.sql runs automatically on first boot of an empty data dir.
      # Points at the TRIAGE schema (triage_log / triage_policy / segment_metrics),
      # not the archived audit project.
      - ./nat_sandbox/severity_lab/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # index-hygiene + pipeline-healer schemas (tables, policies, seeded demo jobs) so
      # all three verticals have their tables on first boot — not just triage.
      - ./nat_sandbox/severity_lab/sql/index_hygiene.sql:/docker-entrypoint-initdb.d/02-index-hygiene.sql:ro
      - ./nat_sandbox/severity_lab/sql/pipeline_healer.sql:/docker-entrypoint-initdb.d/03-pipeline-healer.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U versos -d versos"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Adminer = clickable web UI to browse Postgres (tables + the views).
  # Open http://localhost:8081 → System=PostgreSQL, Server=postgres,
  # User=versos, Password=versos, Database=versos. (Server is the SERVICE name,
  # not localhost — Adminer talks to Postgres over the compose network.)
  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
