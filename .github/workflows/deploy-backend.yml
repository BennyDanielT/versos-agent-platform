name: Deploy backend (App Runner)

# Build the backend image, push to ECR, and trigger an App Runner deployment.
# Auth is OIDC (no long-lived AWS keys). Configure the App Runner service for MANUAL
# deployments so this workflow controls the rollout.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "nat_sandbox/**"
      - "Dockerfile"
      - "requirements-deploy.txt"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

permissions:
  id-token: write        # required for OIDC role assumption
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}          # e.g. versos-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"

      - name: Trigger App Runner deployment
        env:
          SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          # During first-time bootstrap the App Runner service doesn't exist yet;
          # the image is already in ECR, so just skip the rollout in that case.
          if [ -z "$SERVICE_ARN" ]; then
            echo "APPRUNNER_SERVICE_ARN not set — skipping rollout (bootstrap build)."
            exit 0
          fi
          aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --region "$AWS_REGION"
