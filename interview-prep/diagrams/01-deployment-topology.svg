<svg width="100%" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg"><title>Production deployment topology</title><desc>Next.js frontend on Vercel calls an ECS Fargate service running FastAPI plus NAT workflows, which talks to RDS Postgres, NVIDIA NIM, and Phoenix. EventBridge fires scheduled ECS task jobs that write to Postgres.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="270" y="44" width="140" height="34" rx="6"/><text class="t" x="340" y="65" text-anchor="middle">User browser</text></g>
<g class="c-teal"><rect x="255" y="98" width="170" height="46" rx="6"/><text class="t" x="340" y="120" text-anchor="middle">Next.js UI</text><text class="ts" x="340" y="136" text-anchor="middle">Vercel / Amplify</text></g>
<g class="c-teal"><rect x="288" y="172" width="104" height="32" rx="6"/><text class="t" x="340" y="192" text-anchor="middle">ALB</text></g>
<g class="c-blue"><rect x="205" y="234" width="270" height="56" rx="6"/><text class="t" x="340" y="258" text-anchor="middle">ECS Service · Fargate</text><text class="ts" x="340" y="276" text-anchor="middle">FastAPI + NAT workflows</text></g>

<g class="c-teal"><rect x="48" y="332" width="170" height="52" rx="6"/><text class="t" x="133" y="356" text-anchor="middle">RDS Postgres</text><text class="ts" x="133" y="372" text-anchor="middle">tables · views · flags</text></g>
<g class="c-teal"><rect x="256" y="332" width="168" height="52" rx="6"/><text class="t" x="340" y="356" text-anchor="middle">NVIDIA NIM</text><text class="ts" x="340" y="372" text-anchor="middle">hosted LLM endpoint</text></g>
<g class="c-teal"><rect x="462" y="332" width="170" height="52" rx="6"/><text class="t" x="547" y="356" text-anchor="middle">Phoenix</text><text class="ts" x="547" y="372" text-anchor="middle">traces + tokens</text></g>

<g class="c-teal"><rect x="48" y="436" width="150" height="48" rx="6"/><text class="t" x="123" y="458" text-anchor="middle">EventBridge</text><text class="ts" x="123" y="474" text-anchor="middle">weekly + hourly</text></g>
<g class="c-blue"><rect x="238" y="432" width="196" height="24" rx="5"/><text class="t" x="336" y="449" text-anchor="middle">promotion_job task</text></g>
<g class="c-blue"><rect x="238" y="462" width="196" height="24" rx="5"/><text class="t" x="336" y="479" text-anchor="middle">monitor_job task</text></g>

<line x1="340" y1="78" x2="340" y2="96" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="144" x2="340" y2="170" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="204" x2="340" y2="232" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="250" y1="290" x2="150" y2="330" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="290" x2="340" y2="330" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="290" x2="540" y2="330" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="198" y1="450" x2="236" y2="445" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="198" y1="460" x2="236" y2="471" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="300" y1="432" x2="180" y2="386" stroke="var(--s)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="48" y="502" width="13" height="13" rx="3" class="c-blue"/><text class="ts" x="68" y="513">Your agent code (containers)</text>
<rect x="300" y="502" width="13" height="13" rx="3" class="c-teal"/><text class="ts" x="320" y="513">Managed / external services</text>
</svg>
