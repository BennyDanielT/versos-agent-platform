<svg width="100%" viewBox="0 0 680 472" role="img" xmlns="http://www.w3.org/2000/svg"><title>Where guardrails and evals integrate</title><desc>The pipeline runs input, assess, decide, act, with a guardrail attached at each stage. Every decision is logged; an offline golden-set eval gates the model, and an online review-plus-CSAT loop drives promotion and demotion of the autonomy policy.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-blue"><rect x="44" y="50" width="132" height="42" rx="6"/><text class="t" x="110" y="71" text-anchor="middle">Input</text><text class="ts" x="110" y="87" text-anchor="middle">complaint in</text></g>
<g class="c-blue"><rect x="196" y="50" width="132" height="42" rx="6"/><text class="t" x="262" y="71" text-anchor="middle">Assess</text><text class="ts" x="262" y="87" text-anchor="middle">LLM structured output</text></g>
<g class="c-blue"><rect x="348" y="50" width="132" height="42" rx="6"/><text class="t" x="414" y="71" text-anchor="middle">Decide</text><text class="ts" x="414" y="87" text-anchor="middle">policy + flags</text></g>
<g class="c-blue"><rect x="500" y="50" width="132" height="42" rx="6"/><text class="t" x="566" y="71" text-anchor="middle">Act / reply</text><text class="ts" x="566" y="87" text-anchor="middle">suggest·approved·auto</text></g>

<g class="c-amber"><rect x="44" y="104" width="132" height="36" rx="5"/><text class="ts" x="110" y="126" text-anchor="middle">regex + NeMo rail</text></g>
<g class="c-amber"><rect x="196" y="104" width="132" height="36" rx="5"/><text class="ts" x="262" y="126" text-anchor="middle">schema validation</text></g>
<g class="c-amber"><rect x="348" y="104" width="132" height="36" rx="5"/><text class="ts" x="414" y="120" text-anchor="middle">autonomy cap · critical</text><text class="ts" x="414" y="134" text-anchor="middle">hold · kill switch</text></g>
<g class="c-amber"><rect x="500" y="104" width="132" height="36" rx="5"/><text class="ts" x="566" y="126" text-anchor="middle">PII mask · approval</text></g>
<text class="ts" x="340" y="160" text-anchor="middle">↑ a guardrail at every stage (defense in depth)</text>

<g class="c-blue"><rect x="274" y="186" width="132" height="42" rx="6"/><text class="t" x="340" y="207" text-anchor="middle">triage_log</text><text class="ts" x="340" y="223" text-anchor="middle">every decision</text></g>

<g class="c-amber"><rect x="48" y="276" width="244" height="56" rx="6"/><text class="t" x="170" y="299" text-anchor="middle">Offline eval</text><text class="ts" x="170" y="317" text-anchor="middle">golden set · nat eval = CI gate</text></g>
<g class="c-amber"><rect x="340" y="266" width="292" height="76" rx="6"/><text class="t" x="486" y="289" text-anchor="middle">Online eval + trust loop</text><text class="ts" x="486" y="308" text-anchor="middle">reviews + CSAT → metrics + calibration</text><text class="ts" x="486" y="324" text-anchor="middle">promotion_job (up) · monitor_job (down)</text></g>

<line x1="176" y1="71" x2="194" y2="71" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="328" y1="71" x2="346" y2="71" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="71" x2="498" y2="71" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="122" x2="406" y2="200" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="300" y1="228" x2="210" y2="274" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="228" x2="450" y2="264" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="200" y1="276" x2="258" y2="94" stroke="var(--s)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="486" y1="266" x2="430" y2="94" stroke="var(--s)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="44" y="352" width="13" height="13" rx="3" class="c-blue"/><text class="ts" x="64" y="363">Pipeline stages</text>
<rect x="210" y="352" width="13" height="13" rx="3" class="c-amber"/><text class="ts" x="230" y="363">Guardrails + evals (the trust layer)</text>
<text class="ts" x="44" y="392" text-anchor="start">Dashed = feedback: offline gates the model/prompt; online feeds the autonomy policy.</text>
</svg>
